# GoldasT Bot v2.1 Configuration
# Optimized: 5x leverage, no partial TP, R:R 3:1, strict filters
# Balance: ~$130, Margin per trade: 5%, Leverage: 5x → ~$130 notional/trade

# API Credentials
api:
  key: "${BITUNIX_API_KEY}"
  secret: "${BITUNIX_SECRET}"
  base_url: "https://fapi.bitunix.com"
  timeout: 30                    # HTTP request timeout (seconds)

# Core Symbols — Top market cap + DeFi/L1 (candle-close FVG only)
